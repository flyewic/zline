name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Unit tests
        run: zig build test --summary all

      - name: Debug build + leak check
        run: |
          zig build
          ./zig-out/bin/zline src/

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            ext: ""
          - target: x86_64-macos
            ext: ""
          - target: x86_64-windows
            ext: ".exe"
          - target: aarch64-linux
            ext: ""
          - target: aarch64-macos
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.target }}

      - name: Rename artifact
        run: mv zig-out/bin/zline${{ matrix.ext }} zline-${{ matrix.target }}${{ matrix.ext }}

      - uses: softprops/action-gh-release@v2
        with:
          files: zline-${{ matrix.target }}${{ matrix.ext }}
