name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Unit tests
        run: zig build test --summary all

      - name: Debug build + leak check
        run: |
          zig build
          ./zig-out/bin/zline src/

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - x86_64-linux
          - x86_64-macos
          - x86_64-windows
          - aarch64-linux
          - aarch64-macos

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.target }} -Dname=zline-${{ matrix.target }}

      - uses: softprops/action-gh-release@v2
        with:
          files: zig-out/bin/zline-${{ matrix.target }}*
