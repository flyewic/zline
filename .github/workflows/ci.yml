name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Unit tests
        run: zig build test --summary all

      - name: Debug build + leak check
        run: |
          zig build
          ./zig-out/bin/zline src/

  draft-release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --draft --title "${{ github.ref_name }}" --repo ${{ github.repository }}

  build-assets:
    needs: draft-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - x86_64-linux
          - x86_64-macos
          - x86_64-windows
          - aarch64-linux
          - aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.target }} -Dname=zline-${{ matrix.target }}

      - name: Generate checksum
        run: |
          for f in zig-out/bin/zline-${{ matrix.target }}*; do
            sha256sum "$f" | cut -d' ' -f1 > "$f.sha256"
          done

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} zig-out/bin/zline-${{ matrix.target }}* --repo ${{ github.repository }}

  publish:
    needs: build-assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit ${{ github.ref_name }} --draft=false --repo ${{ github.repository }}

  packaging:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets
          gh release download ${{ github.ref_name }} --dir assets --repo ${{ github.repository }}

      - name: Update Scoop manifest
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          WIN_HASH=$(sha256sum assets/zline-x86_64-windows.exe | cut -d' ' -f1)
          cat > bucket/zline.json << MANIFEST
          {
              "version": "${VER}",
              "description": "fast line counter in zig",
              "homepage": "https://github.com/flyewic/zline",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/flyewic/zline/releases/download/${TAG}/zline-x86_64-windows.exe",
                      "hash": "sha256:${WIN_HASH}"
                  }
              },
              "bin": "zline-x86_64-windows.exe",
              "checkver": "github",
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/flyewic/zline/releases/download/\$version/zline-x86_64-windows.exe",
                          "hash": {
                              "url": "\$url.sha256"
                          }
                      }
                  }
              }
          }
          MANIFEST

      - name: Update Homebrew formula
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          X86_LINUX_HASH=$(sha256sum assets/zline-x86_64-linux | cut -d' ' -f1)
          X86_MACOS_HASH=$(sha256sum assets/zline-x86_64-macos | cut -d' ' -f1)
          AARCH64_LINUX_HASH=$(sha256sum assets/zline-aarch64-linux | cut -d' ' -f1)
          AARCH64_MACOS_HASH=$(sha256sum assets/zline-aarch64-macos | cut -d' ' -f1)
          cat > Formula/zline.rb << RUBY
          class Zline < Formula
            desc "fast line counter in zig"
            homepage "https://github.com/flyewic/zline"
            url "https://github.com/flyewic/zline/releases/download/${TAG}/zline-x86_64-linux"
            sha256 "${X86_LINUX_HASH}"
            version "${VER}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/flyewic/zline/releases/download/${TAG}/zline-aarch64-macos"
                sha256 "${AARCH64_MACOS_HASH}"
              else
                url "https://github.com/flyewic/zline/releases/download/${TAG}/zline-x86_64-macos"
                sha256 "${X86_MACOS_HASH}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/flyewic/zline/releases/download/${TAG}/zline-aarch64-linux"
                sha256 "${AARCH64_LINUX_HASH}"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "zline-aarch64-macos" => "zline"
                else
                  bin.install "zline-x86_64-macos" => "zline"
                end
              else
                if Hardware::CPU.arm?
                  bin.install "zline-aarch64-linux" => "zline"
                else
                  bin.install "zline-x86_64-linux" => "zline"
                end
              end
            end

            test do
              system "#{bin}/zline", "--version"
            end
          end
          RUBY

      - uses: peter-evans/create-pull-request@v7
        with:
          title: "chore: update packaging for ${{ github.ref_name }}"
          commit-message: "chore: update packaging for ${{ github.ref_name }} [skip ci]"
          branch: packaging/${{ github.ref_name }}
          delete-branch: true
